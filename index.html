<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JokenPô - Jogue Pedra, Papel e Tesoura contra o computador">
    <meta property="og:type" content="website">
    <meta property="og:title" content="JokenPô - Jogo Clássico Online">
    <meta property="og:description" content="Jogue Pedra, Papel e Tesoura contra o computador. Desafie o JokenBot e teste sua sorte!">
    <meta property="og:image" content="./assets/capa.png">
    <meta property="og:url" content="https://hsiqueira98.github.io/JokenPO/">
    <link rel="icon" href="./assets/icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
    <title>JokenPO</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Quadro de Opções e Resultados -->
    <div class="container">

        <!-- Título -->
        <h1>JokenPô</h1>

        <!-- Botões de Escolha -->
        <div class="buttons">
            <button id="rock" class="btn">&#x270A</button>
            <button id="paper" class="btn">&#x1F590</button>
            <button id="scissors" class="btn">&#x270C</button>
        </div>

        <!-- Exibição de Resultados -->
        <div class="result">
            <!-- Seção das Escolhas -->
            <div class="choices">
                <div class="choice">
                    <div class="choice-label">Sua Escolha</div>
                    <div class="choice-emoji" id="user-emoji">-</div>
                    <div class="choice-value" id="user-choice">-</div>
                </div>
                <div class="vs-separator">vs</div>
                <div class="choice">
                    <div class="choice-label">JokenBot</div>
                    <div class="choice-emoji" id="computer-emoji">-</div>
                    <div class="choice-value" id="computer-choice">-</div>
                </div>
            </div>

            <!-- Seção do Resultado -->
            <div class="outcome-section" id="outcome-display">
                <div class="outcome-label">Resultado</div>
                <div class="outcome-text" id="outcome">-</div>
            </div>
        </div>

        <!-- Placar -->
        <div class="score">
            <p id="user-score">Você: <span>0</span></p>
            <p id="computer-score">JokenBot: <span>0</span></p>
        </div>

    </div>

</body>

<script src="script.js"></script>
</html>
